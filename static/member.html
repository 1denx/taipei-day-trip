<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/css/all.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <title>Member</title>
  </head>
  <body>
    <div id="header-container"></div>
    <main>
      <div class="decor-line"></div>
      <section class="member-container">
        <div class="sidebar">
          <button type="button" class="btn member-btn">會員資料</button>
          <button type="button" class="btn history-btn">歷史訂單</button>
        </div>
        <div class="data-container">
          <h3 class="content__title">會員資料</h3>
          <div class="info-content content__body" hidden>
            <div class="user-data">
              <img
                class="user-data__avatar"
                src="/static/images/circle_user.svg"
                alt="user-avatar"
              />
              <p class="user-data__name">userName</p>
            </div>
            <form class="edit-form">
              <div class="edit-form__base-info">
                <h4 class="user-data__title">基本資料</h4>
                <div>
                  <label for="">會員信箱</label><input type="text" readonly />
                </div>
                <div><label for="">會員姓名</label><input type="text" /></div>
              </div>
              <div class="edit-form__change-pwd">
                <h4 class="user-data__title">變更密碼</h4>
                <div><label for="">當前的密碼</label><input type="text" /></div>
                <div><label for="">設定新密碼</label><input type="text" /></div>
                <div><label for="">確認新密碼</label><input type="text" /></div>
              </div>
              <button
                type="button"
                class="btn btn--primary edit-form__btn"
                id="edit-btn"
              >
                編輯
              </button>
            </form>
          </div>
          <div class="history-content content__body">
            <div class="order-table">
              <div class="order-table__header"></div>
            </div>
            <table class="order-table">
              <thead class="order-table__header">
                <tr>
                  <th>訂單編號</th>
                  <th>景點名稱</th>
                  <th>預訂日期</th>
                  <th>預訂時間</th>
                  <th>訂單金額</th>
                  <th>付款狀態</th>
                  <th>付款日期</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>2026123456</td>
                  <td>平安鐘</td>
                  <td>2026-01-31</td>
                  <td>下午2點-9點</td>
                  <td>2500</td>
                  <td>已付款</td>
                  <td>2026-01-20 10:30:00</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
    <footer id="scroll-sentinel" class="footer">
      <p class="footer__content text-body-bold text-center">
        COPYRIGHT © 2021 台北一日遊
      </p>
    </footer>

    <script type="module" src="/static/script/components/header.js"></script>
    <script
      type="module"
      src="/static/script/components/auth.js"
      defer
    ></script>
  </body>
</html>
